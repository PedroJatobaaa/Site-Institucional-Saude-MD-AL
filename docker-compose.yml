services:
  # 1. Banco de Dados (Mantido conforme sua configuração)
  db-portal:
    image: postgres:16
    container_name: postgres_portal_saude
    environment:
      TZ: "America/Maceio"
      POSTGRES_USER: usuariosaude
      POSTGRES_PASSWORD: saude123
      POSTGRES_DB: portalsaude
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Backend (Node.js/API)
  backend:
    build: ./backend
    container_name: api_saude
    restart: always
    ports:
      - "3333:3333"
    environment:
      # 👇 ADICIONE OU ATUALIZE ESTA LINHA ABAIXO
      TZ: "America/Maceio"
      DATABASE_URL: "postgresql://usuariosaude:saude123@db-portal:5432/portalsaude?schema=public"
      JWT_SECRET: "secretaria_saude_marechal_deodoro_2026_impulso"
      PORT: 3333
    depends_on:
      - db-portal

  # 3. Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: web_saude
    restart: always
    environment:
      # A URL deve ser a pública, pois o navegador do usuário que fará as requisições
      NEXT_PUBLIC_API_URL: "https://api.smsregulacao.com.br"
    depends_on:
      - backend

  # 4. Nginx (O Porteiro)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tunnel_saude
    restart: always
    command: ["tunnel", "--no-autoupdate", "run", "--token", "eyJhIjoiNjdhYzZiNWNhYjJjNWU0ZGQxYWU3ZmI2ZWNkN2RlYzMiLCJ0IjoiODM3YTg1YjktYWNiZC00YzFkLTk5ZTItYzliN2E5YmYxYjMyIiwicyI6Ik1tWmlOR1poTVRVdE5UTmlaUzAwWldReUxXSmxZbUl0TVRZMVl6ZzVNR0V6TURJMiJ9"]
    depends_on:
      - nginx


volumes:
  postgres_data: