# Uso local: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333
        API_INTERNAL_URL: http://backend:3333
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    depends_on:
      - backend

  nginx:
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf

  cloudflared:
    profiles:
      - tunnel
